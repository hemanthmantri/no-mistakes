name: tag-release

# Builds release artifacts when a named tag is pushed directly (e.g. fork tags
# like `harness-support`). Semver-style `vX.Y.Z` tags are handled by
# release-please in `release.yml` and intentionally excluded here so we don't
# double-publish.

on:
  push:
    tags:
      - "*"
      - "!v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
      - id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag_name }}
        run: gh release create "$TAG" --draft --title "$TAG" --notes "Build artifacts for tag $TAG."

  build-and-upload:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag_name }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
          UMAMI_HOST: https://a.kunchenguid.com
          UMAMI_WEBSITE_ID: f959e889-92f5-4121-8a1f-571b10861198
        run: |
          set -euo pipefail
          mkdir -p dist
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT="$(git rev-parse --short=7 HEAD)"
          BIN="no-mistakes"
          OUT="dist/${BIN}"
          if [ "$GOOS" = "windows" ]; then
            BIN="${BIN}.exe"
            OUT="dist/${BIN}"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -ldflags "-X github.com/kunchenguid/no-mistakes/internal/buildinfo.Version=${TAG} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.Commit=${COMMIT} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.Date=${DATE} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.TelemetryHost=${UMAMI_HOST} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.TelemetryWebsiteID=${UMAMI_WEBSITE_ID}" \
            -o "$OUT" ./cmd/no-mistakes
          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="dist/no-mistakes-${TAG}-${GOOS}-${GOARCH}.zip"
            (
              cd dist
              zip -q "$(basename "$ARCHIVE")" "$BIN"
            )
          else
            ARCHIVE="dist/no-mistakes-${TAG}-${GOOS}-${GOARCH}.tar.gz"
            tar -C dist -czf "$ARCHIVE" "$BIN"
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: gh release upload "$TAG" "$ARCHIVE" --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  checksums:
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-and-upload
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum no-mistakes-* > ../checksums.txt
          )
      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: gh release upload "$TAG" checksums.txt --clobber

  finalize:
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-and-upload
      - checksums
    steps:
      - name: Publish draft release as prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false --prerelease=true
